<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Shortener — Convert Links Instantly</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nOMxObhFctVdB835SDzua5Eqxs+54EJiWEd0EVLM1qvyhx5G45V54c17c2up36E5X44fxoI5RzGg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
    <div class="bg-grid"></div>

    <header>
        <a href="/" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            <span>Go Short</span>
        </a>
        <nav>
            <a href="/admin/manage/" class="nav-link">Dashboard</a>
        </nav>
    </header>

    <main>
        <div class="hero-text">
            <h1>Shorten Your Connections</h1>
            <p>Create clean, memorable, and tracking-ready short links in one click.</p>
        </div>

        <div class="card">
            <form id="shortenForm">
                <div class="form-group">
                    <label class="form-label" for="longUrl">Destination URL</label>
                    <input type="url" id="longUrl" placeholder="https://example.com/very/long/path/to/something" required>
                </div>

                <div class="options-toggle" id="optionsToggle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    <span>Advanced Settings</span>
                </div>

                <div class="advanced-options" id="advancedOptions">
                    <div class="form-group">
                        <label class="form-label" for="customSlug">Custom Suffix (Optional)</label>
                        <input type="text" id="customSlug" placeholder="e.g., mylink" pattern="^[a-zA-Z0-9\-_]+$">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="expiryDate">Expiration Date (Optional)</label>
                        <input type="date" id="expiryDate">
                    </div>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    <span>Shorten URL</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>

            <div class="result-section" id="resultSection">
                <div class="form-label">Your Shortened Link</div>
                <div class="result-box">
                    <div class="result-url" id="resultUrl"></div>
                    <button class="btn-icon" id="copyBtn" title="Copy Link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>

                <div class="qr-container">
                    <div id="qrcode" class="qr-code"></div>
                    <button class="btn" style="width: auto; padding: 0.5rem 1rem; font-size: 0.875rem;" id="downloadQrBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        <span>Download QR Code</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon"></div>
        <span id="toastMessage"></span>
    </div>

    <footer>
        <p>&copy; 2026 Go Short. Powered by Chhoto URL & Rust.</p>
    </footer>

    <script>
        // DOM Elements
        const optionsToggle = document.getElementById('optionsToggle');
        const advancedOptions = document.getElementById('advancedOptions');
        const shortenForm = document.getElementById('shortenForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultSection = document.getElementById('resultSection');
        const resultUrl = document.getElementById('resultUrl');
        const copyBtn = document.getElementById('copyBtn');
        const downloadQrBtn = document.getElementById('downloadQrBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = document.getElementById('toastIcon');

        let qrCodeInstance = null;

        // Toggle Advanced Options
        optionsToggle.addEventListener('click', () => {
            optionsToggle.classList.toggle('open');
            advancedOptions.classList.toggle('open');
        });

        // Toast Notification Helper
        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            toast.className = 'toast show';
            
            if (type === 'success') {
                toast.classList.add('toast-success');
                toastIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                toast.classList.add('toast-error');
                toastIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
            }

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Form Submit handler
        shortenForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const longlink = document.getElementById('longUrl').value;
            const shortlink = document.getElementById('customSlug').value.trim() || undefined;
            const expiryDate = document.getElementById('expiryDate').value;
            
            let expiry_time = 0;
            if (expiryDate) {
                expiry_time = Math.floor(new Date(expiryDate).getTime() / 1000);
            }

            submitBtn.disabled = true;
            submitBtn.querySelector('span').textContent = 'Shortening...';

            try {
                const response = await fetch('/api/new', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Api-Key': 'fate110_api_key'
                    },
                    body: JSON.stringify({ longlink, shortlink, expiry_time })
                });

                const data = await response.json();

                if (data.success) {
                    const generatedUrl = data.shorturl;
                    resultUrl.textContent = generatedUrl;
                    resultSection.style.display = 'block';
                    
                    // Generate QR Code
                    const qrContainer = document.getElementById('qrcode');
                    qrContainer.innerHTML = '';
                    qrCodeInstance = new QRCode(qrContainer, {
                        text: generatedUrl,
                        width: 140,
                        height: 140,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });

                    showToast('Short URL generated successfully!');
                    resultSection.scrollIntoView({ behavior: 'smooth' });
                } else {
                    showToast(data.message || 'Failed to shorten URL. Suffix might already be taken.', 'error');
                }
            } catch (err) {
                showToast('Network error, please try again.', 'error');
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('span').textContent = 'Shorten URL';
            }
        });

        // Copy button handler
        copyBtn.addEventListener('click', () => {
            const url = resultUrl.textContent;
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link copied to clipboard!');
                copyBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00F5A0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                setTimeout(() => {
                    copyBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                }, 2000);
            }).catch(() => {
                showToast('Failed to copy link.', 'error');
            });
        });

        // Download QR Code handler
        downloadQrBtn.addEventListener('click', () => {
            const img = document.querySelector('#qrcode img');
            if (img && img.src) {
                const link = document.createElement('a');
                link.href = img.src;
                link.download = `qr-code-${document.getElementById('customSlug').value || 'shortlink'}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('QR Code download started!');
            } else {
                showToast('QR code image not ready.', 'error');
            }
        });
    </script>
</body>
</html>
