<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Shortener — Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>

    <header>
        <a href="/" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            <span>Go Short</span>
        </a>
        <nav>
            <a href="/" class="nav-link">Home</a>
            <a href="/admin/manage/" class="nav-link active">Dashboard</a>
        </nav>
    </header>

    <main style="max-width: 1000px; width: 100%;">
        <!-- Login Panel -->
        <div class="card login-card" id="loginPanel">
            <h2 class="login-title">Admin Dashboard</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn">
                    <span>Unlock</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </button>
            </form>
        </div>

        <!-- Dashboard Panel -->
        <div id="dashboardPanel" style="display: none; width: 100%;">
            <div class="dashboard-header">
                <h2>Link Management</h2>
                <button class="btn" style="width: auto; padding: 0.5rem 1rem;" id="logoutBtn">
                    <span>Lock Dashboard</span>
                </button>
            </div>

            <div class="table-wrapper">
                <table id="linksTable">
                    <thead>
                        <tr>
                            <th>Short Link</th>
                            <th>Target URL</th>
                            <th>Clicks</th>
                            <th>Expiration</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 3rem;">Loading your shortened links...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon"></div>
        <span id="toastMessage"></span>
    </div>

    <footer>
        <p>&copy; 2026 Go Short. Powered by Chhoto URL & Rust.</p>
    </footer>

    <script>
        // DOM Elements
        const loginPanel = document.getElementById('loginPanel');
        const dashboardPanel = document.getElementById('dashboardPanel');
        const loginForm = document.getElementById('loginForm');
        const logoutBtn = document.getElementById('logoutBtn');
        const linksTableBody = document.getElementById('linksTableBody');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = document.getElementById('toastIcon');

        // Check Local Authentication State
        if (sessionStorage.getItem('admin_unlocked') === 'true') {
            showDashboard();
        }

        // Toast Notification Helper
        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            toast.className = 'toast show';
            
            if (type === 'success') {
                toast.classList.add('toast-success');
                toastIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                toast.classList.add('toast-error');
                toastIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
            }

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Handle Login Submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;

            if (password === '110') {
                sessionStorage.setItem('admin_unlocked', 'true');
                showToast('Welcome back, Admin!');
                showDashboard();
            } else {
                showToast('Incorrect password.', 'error');
                document.getElementById('adminPassword').value = '';
            }
        });

        // Handle Logout
        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('admin_unlocked');
            loginPanel.style.display = 'block';
            dashboardPanel.style.display = 'none';
            document.getElementById('adminPassword').value = '';
            showToast('Dashboard locked.');
        });

        // Show Dashboard Panel
        function showDashboard() {
            loginPanel.style.display = 'none';
            dashboardPanel.style.display = 'block';
            fetchLinks();
        }

        // Fetch Links from API
        async function fetchLinks() {
            try {
                const response = await fetch('/api/all', {
                    headers: {
                        'X-Api-Key': 'fate110_api_key'
                    }
                });

                if (response.status === 401) {
                    showToast('API access unauthorized. Please verify the API key.', 'error');
                    return;
                }

                const links = await response.json();
                renderLinks(links);
            } catch (err) {
                console.error(err);
                linksTableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--error); padding: 3rem;">Failed to connect to API server.</td></tr>`;
            }
        }

        // Render Links into Table
        function renderLinks(links) {
            if (!links || links.length === 0) {
                linksTableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 3rem;">No shortened links created yet.</td></tr>`;
                return;
            }

            // Sort by hits descending or alphabetical. Let's list newest (default array order)
            linksTableBody.innerHTML = '';
            links.forEach(link => {
                const row = document.createElement('tr');
                
                // Expiry Badge
                let expiryBadge = `<span class="badge badge-never">Never</span>`;
                if (link.expiry_time > 0) {
                    const date = new Date(link.expiry_time * 1000);
                    const isExpired = date.getTime() < Date.now();
                    expiryBadge = `<span class="badge ${isExpired ? 'badge-expiry' : 'badge-hits'}" title="${date.toLocaleString()}">${date.toLocaleDateString()}</span>`;
                }

                row.innerHTML = `
                    <td>
                        <a href="/${link.shortlink}" target="_blank" class="table-link">${link.shortlink}</a>
                    </td>
                    <td>
                        <div class="table-long-link" title="${link.longlink}">${link.longlink}</div>
                    </td>
                    <td>
                        <span class="badge badge-hits">${link.hits} Clicks</span>
                    </td>
                    <td>
                        ${expiryBadge}
                    </td>
                    <td>
                        <button class="btn-delete" onclick="deleteLink('${link.shortlink}')" title="Delete Link">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </td>
                `;
                linksTableBody.appendChild(row);
            });
        }

        // Delete a Link
        async function deleteLink(slug) {
            if (!confirm(`Are you sure you want to delete the shortlink "${slug}"?`)) {
                return;
            }

            try {
                const response = await fetch(`/api/del/${slug}`, {
                    method: 'DELETE',
                    headers: {
                        'X-Api-Key': 'fate110_api_key'
                    }
                });

                if (response.ok) {
                    showToast(`Shortlink "${slug}" deleted.`);
                    fetchLinks();
                } else {
                    showToast('Failed to delete the link.', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Network error, please try again.', 'error');
            }
        }
    </script>
</body>
</html>
