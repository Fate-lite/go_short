<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Shortener — Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>

    <header>
        <a href="/" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            <span>Go Short</span>
        </a>
        <nav>
            <a href="/" class="nav-link">Home</a>
            <a href="/admin/manage/" class="nav-link active">Dashboard</a>
        </nav>
    </header>

    <main style="max-width: 1000px; width: 100%;">
        <!-- Login Panel -->
        <div class="card login-card" id="loginPanel">
            <h2 class="login-title">Admin Dashboard</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn">
                    <span>Unlock</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </button>
            </form>
        </div>

        <!-- Dashboard Panel -->
        <div id="dashboardPanel" style="display: none; width: 100%;">
            <div class="dashboard-header">
                <h2>Link Management</h2>
                <button class="btn" style="width: auto; padding: 0.5rem 1rem;" id="logoutBtn">
                    <span>Lock Dashboard</span>
                </button>
            </div>

            <div class="search-bar-container">
                <div class="search-input-wrapper">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="Search links by short link, target URL, or notes (at least 3 characters)..." autocomplete="off">
                </div>
            </div>

            <div class="table-wrapper">
                <table id="linksTable">
                    <thead>
                        <tr>
                            <th>Short Link</th>
                            <th>Target URL</th>
                            <th>Clicks</th>
                            <th>Expiration</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 3rem;">Loading your shortened links...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Edit Link Modal -->
    <div id="editModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Short Link</h3>
                <button class="modal-close-btn" id="closeEditModalBtn" title="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <form id="editLinkForm">
                <input type="hidden" id="editShortlink">
                
                <div class="form-group">
                    <label class="form-label" for="editLonglink">Target URL</label>
                    <input type="url" id="editLonglink" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="editExpiryDate">Expiration Date (Optional)</label>
                    <input type="date" id="editExpiryDate">
                    <small style="color: var(--text-secondary); font-size: 0.75rem; margin-top: 0.25rem; display: block;">Leave blank to clear expiration (Never expire).</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="editNotes">Notes (Optional)</label>
                    <textarea id="editNotes" placeholder="Write a note about this link..." rows="3" style="width: 100%; min-height: 80px; padding: 0.75rem; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #ffffff; font-family: inherit; font-size: 0.9rem; resize: vertical; outline: none; transition: all 0.3s;"></textarea>
                </div>
                
                <div class="form-group checkbox-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; margin-bottom: 1.5rem;">
                    <input type="checkbox" id="editResetHits" style="width: auto; margin-right: 0.25rem; cursor: pointer;">
                    <label for="editResetHits" style="cursor: pointer; font-size: 0.9rem; user-select: none;">Reset click counter (Hits) to 0</label>
                </div>
                
                <button type="submit" class="btn" id="editSubmitBtn">
                    <span>Save Changes</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon"></div>
        <span id="toastMessage"></span>
    </div>

    <footer>
        <p>&copy; 2026 Go Short. Powered by Chhoto URL & Rust.</p>
    </footer>

    <script>
        // DOM Elements
        const loginPanel = document.getElementById('loginPanel');
        const dashboardPanel = document.getElementById('dashboardPanel');
        const loginForm = document.getElementById('loginForm');
        const logoutBtn = document.getElementById('logoutBtn');
        const linksTableBody = document.getElementById('linksTableBody');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = document.getElementById('toastIcon');

        // Global State
        let allLinks = [];
        let currentSearchQuery = '';

        // Check Authentication State on load
        async function initAuth() {
            try {
                const response = await fetch('/api/whoami');
                const role = await response.text();
                if (role === 'admin') {
                    sessionStorage.setItem('admin_unlocked', 'true');
                    showDashboard();
                } else {
                    sessionStorage.removeItem('admin_unlocked');
                    loginPanel.style.display = 'block';
                    dashboardPanel.style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                if (sessionStorage.getItem('admin_unlocked') === 'true') {
                    showDashboard();
                } else {
                    loginPanel.style.display = 'block';
                    dashboardPanel.style.display = 'none';
                }
            }
        }
        initAuth();

        // Toast Notification Helper
        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            toast.className = 'toast show';
            
            if (type === 'success') {
                toast.classList.add('toast-success');
                toastIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                toast.classList.add('toast-error');
                toastIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
            }

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Handle Login Submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: password
                });

                if (response.ok) {
                    sessionStorage.setItem('admin_unlocked', 'true');
                    showToast('Welcome back, Admin!');
                    showDashboard();
                } else {
                    let reason = 'Incorrect password.';
                    try {
                        const data = await response.json();
                        if (data.reason) reason = data.reason;
                    } catch (e) {
                        try {
                            const text = await response.text();
                            if (text) reason = text;
                        } catch (e2) {}
                    }
                    showToast(reason, 'error');
                    document.getElementById('adminPassword').value = '';
                }
            } catch (err) {
                console.error(err);
                showToast('Network error, please try again.', 'error');
            }
        });

        // Handle Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await fetch('/api/logout', { method: 'DELETE' });
            } catch (err) {
                console.error(err);
            }
            sessionStorage.removeItem('admin_unlocked');
            loginPanel.style.display = 'block';
            dashboardPanel.style.display = 'none';
            document.getElementById('adminPassword').value = '';
            showToast('Dashboard locked.');
        });

        // Show Dashboard Panel
        function showDashboard() {
            loginPanel.style.display = 'none';
            dashboardPanel.style.display = 'block';
            fetchLinks();
        }

        // Fetch Links from API
        async function fetchLinks() {
            try {
                let url = '/api/all';
                if (currentSearchQuery && currentSearchQuery.length >= 3) {
                    url += `?filter=${encodeURIComponent(currentSearchQuery)}`;
                }
                const response = await fetch(url);

                if (response.status === 401) {
                    sessionStorage.removeItem('admin_unlocked');
                    loginPanel.style.display = 'block';
                    dashboardPanel.style.display = 'none';
                    showToast('Session expired. Please log in again.', 'error');
                    return;
                }

                const links = await response.json();
                allLinks = links;
                renderLinks(links);
            } catch (err) {
                console.error(err);
                linksTableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--error); padding: 3rem;">Failed to connect to API server.</td></tr>`;
            }
        }

        // Render Links into Table
        function renderLinks(links) {
            if (!links || links.length === 0) {
                linksTableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 3rem;">No shortened links found.</td></tr>`;
                return;
            }

            linksTableBody.innerHTML = '';
            links.forEach(link => {
                const row = document.createElement('tr');
                
                // Expiry Badge
                let expiryBadge = `<span class="badge badge-never">Never</span>`;
                if (link.expiry_time > 0) {
                    const date = new Date(link.expiry_time * 1000);
                    const isExpired = date.getTime() < Date.now();
                    expiryBadge = `<span class="badge ${isExpired ? 'badge-expiry' : 'badge-hits'}" title="${date.toLocaleString()}">${date.toLocaleDateString()}</span>`;
                }

                // Notes Sub-text
                let notesHtml = '';
                if (link.notes && link.notes.trim() !== '') {
                    notesHtml = `<div class="link-notes" title="Notes: ${link.notes.replace(/"/g, '&quot;')}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>${link.notes}</div>`;
                }

                row.innerHTML = `
                    <td>
                        <a href="/${link.shortlink}" target="_blank" class="table-link">${link.shortlink}</a>
                    </td>
                    <td>
                        <div class="table-long-link" title="${link.longlink}">${link.longlink}</div>
                        ${notesHtml}
                    </td>
                    <td>
                        <span class="badge badge-hits">${link.hits} Clicks</span>
                    </td>
                    <td>
                        ${expiryBadge}
                    </td>
                    <td>
                        <div style="display: flex; gap: 0.5rem; justify-content: center; align-items: center;">
                            <button class="btn-edit" onclick="openEditModal('${link.shortlink}')" title="Edit Link">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"></path></svg>
                            </button>
                            <button class="btn-delete" onclick="deleteLink('${link.shortlink}')" title="Delete Link">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </td>
                `;
                linksTableBody.appendChild(row);
            });
        }

        // Delete a Link
        async function deleteLink(slug) {
            if (!confirm(`Are you sure you want to delete the shortlink "${slug}"?`)) {
                return;
            }

            try {
                const response = await fetch(`/api/del/${slug}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast(`Shortlink "${slug}" deleted.`);
                    fetchLinks();
                } else if (response.status === 401) {
                    sessionStorage.removeItem('admin_unlocked');
                    loginPanel.style.display = 'block';
                    dashboardPanel.style.display = 'none';
                    showToast('Session expired. Please log in again.', 'error');
                } else {
                    showToast('Failed to delete the link.', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Network error, please try again.', 'error');
            }
        }

        // Search Input handler with Debounce
        const searchInput = document.getElementById('searchInput');
        let searchTimeout = null;

        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            
            searchTimeout = setTimeout(() => {
                if (query.length === 0 || query.length >= 3) {
                    currentSearchQuery = query;
                    fetchLinks();
                }
            }, 300);
        });

        // Edit Modal Handlers
        const editModal = document.getElementById('editModal');
        const closeEditModalBtn = document.getElementById('closeEditModalBtn');
        const editLinkForm = document.getElementById('editLinkForm');
        const editSubmitBtn = document.getElementById('editSubmitBtn');

        function openEditModal(shortlink) {
            const link = allLinks.find(l => l.shortlink === shortlink);
            if (!link) return;
            
            document.getElementById('editShortlink').value = link.shortlink;
            document.getElementById('editLonglink').value = link.longlink;
            document.getElementById('editNotes').value = link.notes || '';
            document.getElementById('editResetHits').checked = false;
            
            if (link.expiry_time > 0) {
                const date = new Date(link.expiry_time * 1000);
                const yyyy = date.getFullYear();
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const dd = String(date.getDate()).padStart(2, '0');
                document.getElementById('editExpiryDate').value = `${yyyy}-${mm}-${dd}`;
            } else {
                document.getElementById('editExpiryDate').value = '';
            }
            
            editModal.style.display = 'flex';
        }

        closeEditModalBtn.addEventListener('click', () => {
            editModal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === editModal) {
                editModal.style.display = 'none';
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && editModal.style.display === 'flex') {
                editModal.style.display = 'none';
            }
        });

        editLinkForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const shortlink = document.getElementById('editShortlink').value;
            const longlink = document.getElementById('editLonglink').value;
            const reset_hits = document.getElementById('editResetHits').checked;
            const expiryDate = document.getElementById('editExpiryDate').value;
            const notes = document.getElementById('editNotes').value.trim() || null;
            
            const clear_expiry = !expiryDate;
            let expiry_time = null;
            if (expiryDate) {
                expiry_time = Math.floor(new Date(expiryDate).getTime() / 1000);
            }
            const clear_notes = !notes;
            
            editSubmitBtn.disabled = true;
            editSubmitBtn.querySelector('span').textContent = 'Saving...';
            
            try {
                const response = await fetch('/api/edit', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ shortlink, longlink, reset_hits, expiry_time, clear_expiry, notes, clear_notes })
                });
                
                if (response.ok) {
                    showToast('Short link updated successfully!');
                    editModal.style.display = 'none';
                    fetchLinks();
                } else {
                    const text = await response.text();
                    let reason = 'Failed to update shortlink.';
                    try {
                        const json = JSON.parse(text);
                        if (json.reason) reason = json.reason;
                    } catch(e) {}
                    showToast(reason, 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Network error, please try again.', 'error');
            } finally {
                editSubmitBtn.disabled = false;
                editSubmitBtn.querySelector('span').textContent = 'Save Changes';
            }
        });
    </script>
</body>
</html>
